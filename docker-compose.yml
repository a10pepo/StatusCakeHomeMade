services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: statuscake
      POSTGRES_USER: statuscake
      POSTGRES_PASSWORD: statuscake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://statuscake:statuscake@db:5432/statuscake
      SECRET_KEY: statuscake-secret-key
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
